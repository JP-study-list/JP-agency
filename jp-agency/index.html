<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本生活手續查詢器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f5f3; --surface:#fff; --border:#e0e0e0;
    --text:#1a1a1a; --text2:#666; --text3:#999;
    --gold:#b8860b; --gold-soft:#f0e6cc;
  }
  body.dark {
    --bg:#111110; --surface:#1c1c1a; --border:#2e2e2b;
    --text:#f0ede8; --text2:#a8a69e; --text3:#777;
    --gold:#d4a94e; --gold-soft:#3a3320;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans TC',-apple-system,'PingFang TC',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; padding:40px 20px 60px;
    transition:background .2s,color .2s; line-height:1.7;
  }
  .container { max-width:760px; margin:0 auto; }
  header { position:relative; margin-bottom:26px; }
  .toolbar { position:absolute; top:0; right:0; display:flex; gap:8px; }
  .tool-btn {
    width:34px; height:34px; border-radius:50%;
    border:1px solid var(--border); background:var(--surface);
    color:var(--text2); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .15s,color .15s;
  }
  .tool-btn:hover { border-color:var(--gold); color:var(--text); }
  .tool-btn svg { display:block; }
  header h1 { font-weight:700; font-size:clamp(24px,5.5vw,36px); letter-spacing:.02em; padding-right:130px; }
  header p.sub { margin-top:8px; color:var(--text2); font-size:13px; }

  .screen { display:none; }
  .screen.active { display:block; }

  /* 密語頁 / 選擇頁共用面板 */
  .panel {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:26px; margin-top:10px;
  }
  .panel h2 { font-size:18px; font-weight:700; margin-bottom:6px; }
  .panel p.desc { font-size:13px; color:var(--text2); margin-bottom:16px; line-height:1.7; }
  .field-label { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:.1em; margin:16px 0 6px; }
  .panel input[type=text], .panel select {
    width:100%; font-family:inherit; font-size:14px;
    color:var(--text); background:var(--bg);
    border:1px solid var(--border); border-radius:10px;
    padding:11px 13px; appearance:auto;
  }
  .panel input:focus, .panel select:focus { outline:none; border-color:var(--gold); }
  .hint { font-size:11.5px; color:var(--text3); margin-top:6px; }
  .btn-primary {
    width:100%; margin-top:20px; font-family:inherit; font-size:15px; font-weight:600;
    color:#fff; background:var(--gold); border:1px solid var(--gold);
    padding:12px; border-radius:10px; cursor:pointer; transition:opacity .15s;
  }
  .btn-primary:hover { opacity:.9; }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:520px){ .two-col { grid-template-columns:1fr; } }

  /* 結果頁摘要列 */
  .combo-bar {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 16px; background:var(--surface);
    border:1px solid var(--border); border-radius:12px;
    font-size:13px; margin-top:10px;
  }
  .combo-bar .seg { color:var(--text2); }
  .combo-bar .seg b { color:var(--text); font-weight:600; }
  .combo-bar .spacer { flex:1; }
  .link-btn {
    font-family:inherit; font-size:12px; color:var(--gold);
    background:none; border:1px solid var(--border); border-radius:16px;
    padding:4px 12px; cursor:pointer; transition:border-color .15s;
  }
  .link-btn:hover { border-color:var(--gold); }

  .progress-wrap { margin-top:14px; }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:7px; }
  .progress-bar { height:3px; background:var(--border); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--gold); width:0%; transition:width .4s ease; }

  .sync-bar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    margin-top:12px; padding:9px 14px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; font-size:12.5px; color:var(--text2);
  }
  .sync-dot { width:8px; height:8px; border-radius:50%; flex:none; background:var(--text3); }
  .sync-dot.on { background:#3a9d5d; }
  .sync-dot.off { background:#c0392b; }
  .sync-dot.wait { background:var(--gold); }

  .phase { margin-top:32px; }
  .phase-head { display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
  .phase-num { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:.1em; white-space:nowrap; }
  .phase-title { font-weight:700; font-size:19px; }
  .phase-note { font-size:12.5px; color:var(--text2); margin-bottom:14px; }
  .grid { display:grid; grid-template-columns:1fr; gap:10px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color .15s; }
  .card:hover { border-color:var(--gold); }
  .card.done { opacity:.62; }
  .card.done .card-title { text-decoration:line-through; color:var(--text2); }
  .card-head { display:flex; align-items:flex-start; gap:14px; padding:16px 20px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .check { flex:none; width:24px; height:24px; margin-top:1px; border:1.5px solid var(--text3); border-radius:50%; position:relative; transition:.2s; }
  .card.done .check { border-color:var(--gold); background:var(--gold); }
  .check svg { position:absolute; inset:0; margin:auto; opacity:0; transform:scale(.5); transition:.2s; }
  .card.done .check svg { opacity:1; transform:scale(1); }
  .card-main { flex:1; min-width:0; }
  .card-num { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:.06em; display:block; margin-bottom:3px; }
  .card-title { font-weight:600; font-size:17px; }
  .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .badge { font-size:11px; padding:2px 9px; border-radius:20px; color:var(--text2); border:1px solid var(--border); }
  .badge.key { color:var(--gold); border-color:var(--gold); background:var(--gold-soft); }
  .toggle { flex:none; color:var(--text3); margin-top:4px; transition:transform .2s; }
  .card.open .toggle { transform:rotate(180deg); }
  .card-body { display:none; padding:0 20px 20px 58px; font-size:13.5px; }
  .card.open .card-body { display:block; }
  .sec-label { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:.1em; margin:14px 0 6px; }
  .card-body ul { list-style:none; }
  .card-body li { padding-left:15px; position:relative; margin-bottom:4px; }
  .card-body li::before { content:""; position:absolute; left:0; top:.72em; width:5px; height:5px; border-radius:50%; background:var(--gold); opacity:.5; }
  .tip { background:var(--gold-soft); border-radius:10px; padding:11px 14px; margin-top:13px; font-size:13px; }
  .links { margin-top:6px; display:flex; flex-direction:column; gap:7px; }
  .links a { color:var(--text); font-size:13px; text-decoration:none; display:flex; align-items:center; gap:8px; width:fit-content; max-width:100%; }
  .links a .name { border-bottom:1px solid var(--border); padding-bottom:1px; word-break:break-all; }
  .links a:hover .name { border-color:var(--gold); }
  .src-tag { flex:none; font-size:10px; color:var(--text2); border:1px solid var(--border); border-radius:4px; padding:1px 6px; }
  .src-tag.gov { color:var(--gold); border-color:var(--gold); }
  .grid.list-mode .card-head { padding:12px 18px; }
  .grid.list-mode .badges { display:none; }
  .grid.list-mode .card-num { display:inline; margin:0 8px 0 0; }
  .grid.list-mode .card-title { display:inline; font-size:15px; }

  /* 註記 */
  .notes { margin-top:16px; }
  .note-item { display:flex; align-items:flex-start; gap:8px; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:8px 10px; margin-bottom:6px; font-size:13px; word-break:break-word; }
  .note-item .note-text { flex:1; min-width:0; line-height:1.6; }
  .note-item .note-text a { color:var(--gold); text-decoration:none; border-bottom:1px solid var(--gold); word-break:break-all; }
  .note-del { flex:none; background:none; border:none; cursor:pointer; color:var(--text3); font-size:15px; line-height:1; padding:2px 4px; }
  .note-del:hover { color:#c0392b; }
  .note-add { display:flex; gap:8px; margin-top:8px; }
  .note-add textarea { flex:1; resize:vertical; min-height:38px; max-height:160px; font-family:inherit; font-size:13px; line-height:1.6; color:var(--text); background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:8px 10px; }
  .note-add textarea:focus { outline:none; border-color:var(--gold); }
  .note-add-btn { flex:none; padding:0 16px; font-family:inherit; font-size:13px; font-weight:600; color:#fff; background:var(--gold); border:none; border-radius:9px; cursor:pointer; }
  .note-empty { font-size:12.5px; color:var(--text3); }

  .error-box {
    background:#fbeaea; border:1px solid #e0b4b4; color:#8a2f2b;
    border-radius:12px; padding:14px 16px; font-size:13px; margin-top:14px;
    display:none; white-space:pre-line;
  }
  body.dark .error-box { background:#3a2020; border-color:#5e3535; color:#e8b0ab; }
  footer { text-align:center; margin-top:40px; font-size:12px; color:var(--text3); line-height:1.8; }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="container">
  <header>
    <div class="toolbar">
      <button class="tool-btn" id="layout-btn" onclick="toggleLayout()" title="切換顯示模式" aria-label="切換顯示模式">
        <svg id="icon-list" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg id="icon-grid" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="tool-btn" id="theme-btn" onclick="toggleTheme()" title="切換深色模式" aria-label="切換深色模式">
        <svg id="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
    <h1>日本生活手續查詢器</h1>
    <p class="sub">選擇居住地與學校所在地，產生對應的手續清單 ── 台灣護照適用</p>
  </header>

  <div class="error-box" id="errBox"></div>

  <!-- 畫面 1：密語 -->
  <section class="screen" id="scr-pass">
    <div class="panel">
      <h2>輸入通關密語</h2>
      <p class="desc">你的勾選與註記以這組密語存取雲端，在任何裝置輸入同一句即可同步。請設定 12 字以上、只有你（或你的客戶）知道的句子。</p>
      <div class="field-label">通關密語</div>
      <input type="text" id="passInput" placeholder="12 字以上" autocomplete="off">
      <div class="hint" id="passHint">目前 0 字，還需要 12 字</div>
      <button class="btn-primary" id="passGo">連線</button>
    </div>
  </section>

  <!-- 畫面 2：選擇地區 -->
  <section class="screen" id="scr-select">
    <div class="panel">
      <h2>選擇地區</h2>
      <p class="desc">依「居住地」與「學校所在地」產生清單。尚未收錄資料的地區會顯示為不可選，資料檔會分批擴充。</p>
      <div class="two-col">
        <div>
          <div class="field-label">居住地：都道府縣</div>
          <select id="homePref"></select>
          <div class="field-label">居住地：市區町村</div>
          <select id="homeCity"></select>
        </div>
        <div>
          <div class="field-label">學校所在地：都道府縣</div>
          <select id="schoolPref"></select>
          <div class="field-label">學校所在地：市區町村</div>
          <select id="schoolCity"></select>
        </div>
      </div>
      <button class="btn-primary" id="genBtn" disabled>產生清單</button>
    </div>
  </section>

  <!-- 畫面 3：結果 -->
  <section class="screen" id="scr-result">
    <div class="combo-bar">
      <span class="seg">居住：<b id="comboHome"></b></span>
      <span class="seg">學校：<b id="comboSchool"></b></span>
      <span class="spacer"></span>
      <button class="link-btn" id="reselectBtn">重新選擇地區</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>完成進度</span><span id="progText">0 / 0</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <div class="sync-bar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">連線中…</span>
    </div>
    <div id="app"></div>
  </section>

  <footer>
    <p>資訊整理自各官方網站與參考來源，規費與規定可能變動，辦理前請以官方最新公告為準。</p>
  </footer>
</div>

<!-- 資料檔（新增地區時在此追加 script 標籤並登錄 manifest） -->
<script src="data/manifest.js"></script>
<script src="data/common.js"></script>
<script src="data/prefectures.js"></script>
<script src="data/kanagawa/kamakura.js"></script>
<script src="data/kanagawa/kawasaki.js"></script>

<script>
/* ============================================================
   主程式：資料檢查 → 密語 → 選擇 → 產生清單 → 同步
   ============================================================ */
const FB_CONFIG = {
  apiKey: "AIzaSyDxaFt7Nfct1rtjGHrcs8yP-mRVAAwdZ-Q",
  authDomain: "japan-checklist-4c300.firebaseapp.com",
  projectId: "japan-checklist-4c300",
  storageBucket: "japan-checklist-4c300.firebasestorage.app",
  messagingSenderId: "753120723423",
  appId: "1:753120723423:web:e342af1cf988f02b10c46a"
};
const MIN_PASS = 12;
const CHECK_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const CHEV_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

// ── 資料完整性檢查（防 ES 模組式無聲失敗）──
function dataCheck(){
  const D = window.CHECKLIST_DATA || {};
  const missing = [];
  if(!D.manifest) missing.push("data/manifest.js");
  if(!D.items || !D.phases) missing.push("data/common.js");
  if(!D.prefectures) missing.push("data/prefectures.js");
  (D.manifest && D.manifest.municipalities || []).forEach(m=>{
    if(!D.municipalities || !D.municipalities[m.id]) missing.push("data/…/"+m.id+".js（已登錄 manifest 但檔案未載入）");
  });
  if(missing.length){
    const box=document.getElementById('errBox');
    box.style.display='block';
    box.textContent="資料檔載入失敗，請確認以下檔案已一併上傳：\n"+missing.join("\n");
    return false;
  }
  return true;
}

// ── 狀態 ──
let db=null, passphrase=null, unsub=null, applyingRemote=false, saveTimer=null;
let allState={};            // { comboKey: {done:{},notes:{}} }
let combo=null;             // { homeId, schoolId, key }
let ctx=null;               // token 解析上下文
let layoutList=false;

function comboState(){
  if(!combo) return {done:{},notes:{}};
  if(!allState[combo.key]) allState[combo.key]={done:{},notes:{}};
  const s=allState[combo.key];
  s.done=s.done||{}; s.notes=s.notes||{};
  return s;
}
function isDone(id){ return !!comboState().done[id]; }
function getNotes(id){ return comboState().notes[id]||[]; }

// ── 畫面切換 ──
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── token 解析 ──
function pathGet(obj,path){
  return path.split('.').reduce((o,k)=>(o&&o[k]!==undefined)?o[k]:undefined,obj);
}
function resolveText(str){
  return String(str).replace(/\{([\w.]+)\}/g,(m,p)=>{
    const v=pathGet(ctx,p);
    return (v===undefined||v===null||v==="")?"（資料未收錄）":v;
  });
}
function resolveLinks(arr){
  const out=[];
  (arr||[]).forEach(l=>{
    if(typeof l==='string'){
      if(l==='@commute'){
        const o=encodeURIComponent(ctx.home.name+"駅");
        const d=encodeURIComponent(ctx.school.name+"駅");
        out.push(["Google Maps 大眾運輸路線："+ctx.home.name+" → "+ctx.school.name,
          "https://www.google.com/maps/dir/?api=1&origin="+o+"&destination="+d+"&travelmode=transit","參考"]);
        out.push(["Yahoo! 乘換案內","https://transit.yahoo.co.jp/","參考"]);
      }else if(l[0]==='@'){
        const v=pathGet(ctx,l.slice(1));
        if(Array.isArray(v)) v.forEach(x=>out.push(x));
      }
    }else if(Array.isArray(l)){ out.push(l); }
  });
  return out;
}

// ── 選擇器 ──
function fillPrefSelect(sel){
  const M=window.CHECKLIST_DATA.manifest;
  sel.innerHTML='<option value="">請選擇</option>'+M.prefectures.map(p=>{
    const has=M.municipalities.some(m=>m.prefId===p.id);
    return `<option value="${p.id}" ${has?'':'disabled'}>${p.name}${has?'':'（資料未收錄）'}</option>`;
  }).join('');
}
function fillCitySelect(sel,prefId){
  const M=window.CHECKLIST_DATA.manifest;
  const list=M.municipalities.filter(m=>m.prefId===prefId);
  sel.innerHTML='<option value="">請選擇</option>'+list.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
}
function checkGenReady(){
  const ok=document.getElementById('homeCity').value && document.getElementById('schoolCity').value;
  document.getElementById('genBtn').disabled=!ok;
}

// ── 產生清單 ──
function buildCtx(homeId,schoolId){
  const D=window.CHECKLIST_DATA;
  const home=D.municipalities[homeId], school=D.municipalities[schoolId];
  return { home, school,
    prefHome: D.prefectures[home.prefId]||{},
    prefSchool: D.prefectures[school.prefId]||{} };
}
function generate(homeId,schoolId){
  combo={ homeId, schoolId, key:homeId+"__"+schoolId };
  ctx=buildCtx(homeId,schoolId);
  try{ localStorage.setItem('jp-agency-combo', JSON.stringify({homeId,schoolId})); }catch(e){}
  document.getElementById('comboHome').textContent=ctx.home.name;
  document.getElementById('comboSchool').textContent=ctx.school.name;
  render();
  show('scr-result');
}

function render(){
  const D=window.CHECKLIST_DATA;
  const app=document.getElementById('app');
  app.innerHTML='';
  let num=0;
  D.phases.forEach(ph=>{
    const items=D.items.filter(it=>it.phase===ph.id);
    if(!items.length) return;
    const sec=document.createElement('section');
    sec.className='phase';
    sec.innerHTML=`<div class="phase-head"><span class="phase-num">${ph.label}</span><span class="phase-title">${ph.title}</span></div><p class="phase-note">${ph.note}</p>`;
    const grid=document.createElement('div');
    grid.className='grid'+(layoutList?' list-mode':'');
    grid.setAttribute('data-grid','');
    items.forEach(it=>{
      num++;
      const el=document.createElement('article');
      el.className='card'+(isDone(it.id)?' done':'');
      el.dataset.id=it.id;
      const badges=(it.badges||[]).map(b=>`<span class="badge ${b.k?'key':''}">${resolveText(b.t)}</span>`).join('');
      const docs=(it.docs||[]).map(d=>`<li>${resolveText(d)}</li>`).join('');
      const steps=(it.steps||[]).map(s=>`<li>${resolveText(s)}</li>`).join('');
      const links=resolveLinks(it.links).map(l=>
        `<a href="${l[1]}" target="_blank" rel="noopener"><span class="src-tag ${l[2]==='官方'?'gov':''}">${l[2]}</span><span class="name">${l[0]}</span></a>`).join('');
      el.innerHTML=`
        <div class="card-head">
          <div class="check" role="checkbox" aria-checked="${isDone(it.id)}" tabindex="0" aria-label="標記完成：${resolveText(it.title)}">${CHECK_SVG}</div>
          <div class="card-main">
            <span class="card-num">${String(num).padStart(2,'0')}</span>
            <span class="card-title">${resolveText(it.title)}</span>
            <div class="badges">${badges}</div>
          </div>
          <div class="toggle">${CHEV_SVG}</div>
        </div>
        <div class="card-body">
          <div class="sec-label">必要文件</div><ul>${docs}</ul>
          <div class="sec-label">辦理步驟</div><ul>${steps}</ul>
          ${it.tip?`<div class="tip">${resolveText(it.tip)}</div>`:''}
          ${links?`<div class="sec-label">情報來源</div><div class="links">${links}</div>`:''}
          <div class="sec-label">我的註記</div>
          <div class="notes" data-notes="${it.id}"></div>
          <div class="note-add">
            <textarea data-noteinput="${it.id}" rows="1" placeholder="貼上連結或輸入資料…"></textarea>
            <button class="note-add-btn" data-noteadd="${it.id}">新增</button>
          </div>
        </div>`;
      grid.appendChild(el);
    });
    sec.appendChild(grid);
    app.appendChild(sec);
  });
  renderAllNotes();
  updateProgress();
}

function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function linkify(t){ return escapeHtml(t).replace(/(https?:\/\/[^\s]+)/g,u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`).replace(/\n/g,'<br>'); }
function renderNotes(id){
  const box=document.querySelector(`[data-notes="${id}"]`);
  if(!box) return;
  const list=getNotes(id);
  box.innerHTML=list.length?list.map(n=>`<div class="note-item"><div class="note-text">${linkify(n.text)}</div><button class="note-del" data-notedel="${id}" data-nid="${n.id}" title="刪除">×</button></div>`).join(''):'<div class="note-empty">尚無註記</div>';
}
function renderAllNotes(){ window.CHECKLIST_DATA.items.forEach(it=>renderNotes(it.id)); }
function updateProgress(){
  const total=window.CHECKLIST_DATA.items.length;
  const done=Object.keys(comboState().done).filter(k=>comboState().done[k]).length;
  document.getElementById('progText').textContent=`${done} / ${total}`;
  document.getElementById('progFill').style.width=(total?done/total*100:0)+'%';
}

// ── 儲存與同步 ──
function setSync(st,txt){
  document.getElementById('syncDot').className='sync-dot'+(st?(' '+st):'');
  if(txt) document.getElementById('syncText').textContent=txt;
}
function saveLocal(){ try{ localStorage.setItem('jp-agency-state', JSON.stringify(allState)); }catch(e){} }
function loadLocal(){ try{ const r=localStorage.getItem('jp-agency-state'); if(r) allState=JSON.parse(r)||{}; }catch(e){} }
function persist(){
  saveLocal();
  if(!db||!passphrase||applyingRemote) return;
  setSync('wait','儲存中…');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    db.collection('agency').doc(passphrase).set({combos:allState})
      .then(()=>setSync('on','已同步到雲端'))
      .catch(err=>setSync('off','同步失敗：'+(err.code||err.message)));
  },800);
}
function connectCloud(pass, onFirst){
  if(typeof firebase==='undefined'){ setSync('off','無法載入 Firebase'); if(onFirst)onFirst(false); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    db=firebase.firestore();
  }catch(e){ setSync('off','Firebase 初始化失敗'); if(onFirst)onFirst(false); return; }
  passphrase=pass;
  try{ localStorage.setItem('jp-agency-pass',pass); }catch(e){}
  if(unsub) unsub();
  let first=true;
  unsub=db.collection('agency').doc(pass).onSnapshot(doc=>{
    applyingRemote=true;
    if(doc.exists){ allState=(doc.data()||{}).combos||{}; saveLocal(); if(combo) render(); }
    applyingRemote=false;
    setSync('on','已同步到雲端');
    if(first){ first=false; if(onFirst)onFirst(true); }
  },err=>{
    setSync('off','連線失敗：'+(err.code||err.message));
    if(first){ first=false; if(onFirst)onFirst(true); } // 連線失敗仍可離線用
  });
}

// ── 事件 ──
document.getElementById('passInput').addEventListener('input',e=>{
  const n=e.target.value.trim().length;
  const h=document.getElementById('passHint');
  h.textContent=n>=MIN_PASS?`目前 ${n} 字，可以連線`:`目前 ${n} 字，還需要 ${MIN_PASS-n} 字`;
  h.style.color=n>=MIN_PASS?'var(--gold)':'';
});
document.getElementById('passGo').addEventListener('click',()=>{
  const p=document.getElementById('passInput').value.trim();
  if(p.length<MIN_PASS){ document.getElementById('passInput').focus(); return; }
  connectCloud(p,()=>{ show('scr-select'); });
});

const homePref=document.getElementById('homePref'), homeCity=document.getElementById('homeCity');
const schoolPref=document.getElementById('schoolPref'), schoolCity=document.getElementById('schoolCity');
homePref.addEventListener('change',()=>{ fillCitySelect(homeCity,homePref.value); checkGenReady(); });
schoolPref.addEventListener('change',()=>{ fillCitySelect(schoolCity,schoolPref.value); checkGenReady(); });
homeCity.addEventListener('change',checkGenReady);
schoolCity.addEventListener('change',checkGenReady);
document.getElementById('genBtn').addEventListener('click',()=>generate(homeCity.value,schoolCity.value));
document.getElementById('reselectBtn').addEventListener('click',()=>show('scr-select'));

const appEl=document.getElementById('app');
appEl.addEventListener('click',e=>{
  const cb=e.target.closest('.check');
  const del=e.target.closest('[data-notedel]');
  const addBtn=e.target.closest('[data-noteadd]');
  const head=e.target.closest('.card-head');
  const s=comboState();
  if(cb){
    const card=cb.closest('.card'); const id=card.dataset.id;
    if(s.done[id]) delete s.done[id]; else s.done[id]=true;
    card.classList.toggle('done');
    cb.setAttribute('aria-checked',!!s.done[id]);
    persist(); updateProgress();
  }else if(del){
    const id=del.dataset.notedel;
    s.notes[id]=(s.notes[id]||[]).filter(n=>n.id!==del.dataset.nid);
    if(!s.notes[id].length) delete s.notes[id];
    renderNotes(id); persist();
  }else if(addBtn){
    const id=addBtn.dataset.noteadd;
    const ta=document.querySelector(`[data-noteinput="${id}"]`);
    const text=ta.value.trim();
    if(text){
      if(!s.notes[id]) s.notes[id]=[];
      s.notes[id].push({id:'n'+Date.now()+Math.random().toString(36).slice(2,6),text,ts:Date.now()});
      ta.value=''; renderNotes(id); persist();
    }
  }else if(head){
    head.closest('.card').classList.toggle('open');
  }
});
appEl.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='Enter')&&e.target.classList.contains('check')){ e.preventDefault(); e.target.click(); }
  if(e.target.matches('[data-noteinput]')&&(e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    const id=e.target.getAttribute('data-noteinput');
    const btn=document.querySelector(`[data-noteadd="${id}"]`);
    if(btn) btn.click();
  }
});

// ── 主題與版面 ──
function toggleTheme(){
  const dark=document.body.classList.toggle('dark');
  document.getElementById('icon-moon').style.display=dark?'none':'';
  document.getElementById('icon-sun').style.display=dark?'':'none';
  try{ localStorage.setItem('jp-agency-dark',dark?'1':'0'); }catch(e){}
}
function toggleLayout(){
  layoutList=!layoutList;
  document.querySelectorAll('[data-grid]').forEach(g=>g.classList.toggle('list-mode',layoutList));
  document.getElementById('icon-list').style.display=layoutList?'':'none';
  document.getElementById('icon-grid').style.display=layoutList?'none':'';
  try{ localStorage.setItem('jp-agency-layout',layoutList?'list':'grid'); }catch(e){}
}

// ── 初始化 ──
function init(){
  let dark=null;
  try{ dark=localStorage.getItem('jp-agency-dark'); }catch(e){}
  if(dark===null) dark=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'1':'0';
  if(dark==='1'){ document.body.classList.add('dark'); document.getElementById('icon-moon').style.display='none'; document.getElementById('icon-sun').style.display=''; }
  try{ if(localStorage.getItem('jp-agency-layout')==='list') layoutList=true; }catch(e){}
  if(layoutList){ document.getElementById('icon-list').style.display=''; document.getElementById('icon-grid').style.display='none'; }

  if(!dataCheck()){ show('scr-pass'); return; }
  fillPrefSelect(homePref); fillPrefSelect(schoolPref);
  fillCitySelect(homeCity,''); fillCitySelect(schoolCity,'');
  loadLocal();

  let savedPass=null, savedCombo=null;
  try{ savedPass=localStorage.getItem('jp-agency-pass'); }catch(e){}
  try{ savedCombo=JSON.parse(localStorage.getItem('jp-agency-combo')||'null'); }catch(e){}

  if(savedPass){
    connectCloud(savedPass,()=>{
      const D=window.CHECKLIST_DATA;
      if(savedCombo && D.municipalities[savedCombo.homeId] && D.municipalities[savedCombo.schoolId]){
        // 預填選擇器並直接進結果頁
        const h=D.municipalities[savedCombo.homeId], s=D.municipalities[savedCombo.schoolId];
        homePref.value=h.prefId; fillCitySelect(homeCity,h.prefId); homeCity.value=h.id;
        schoolPref.value=s.prefId; fillCitySelect(schoolCity,s.prefId); schoolCity.value=s.id;
        checkGenReady();
        generate(savedCombo.homeId,savedCombo.schoolId);
      }else{
        show('scr-select');
      }
    });
  }else{
    show('scr-pass');
  }
}
init();
</script>
